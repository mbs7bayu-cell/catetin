<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f2f2ef" id="themeColor">
<title>Tambah Dompet</title>
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/button.css">
<link rel="stylesheet" href="css/navigasi.css">
<link rel="stylesheet" href="css/tambah-dompet.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
    <div class="card">
        
        <h2>Tambah Dompet</h2>
        <label>Nama Dompet</label>
        <input id="nama" type="text" placeholder="Contoh: BCA / DANA / Tunai">

        <label>Tipe</label>
        <select id="tipe">
        <option value="cash">Cash</option>
        <option value="bank">Bank</option>
        <option value="e-wallet">E-Wallet</option>
        </select>
        <span id="loading" style="display:none">⏳ Menyimpan...</span>
        <button id="btnSimpan" onclick="simpan()">Simpan</button>

    </div>

</div>

<div class="bottomNav">

  <button data-menu="dashboard" onclick="lihatDashboard()">
    <span>🏠</span>
    <small>Home</small>
  </button>

  <button data-menu="dompet" onclick="lihatDompet()">
    <span>💳</span>
    <small>Dompet</small>
  </button>

  <button data-menu="laporan" onclick="lihatLaporan()">
    <span>📊</span>
    <small>Laporan</small>
  </button>

  <button data-menu="user-profil" onclick="lihatProfil()">
    <span>👤</span>
    <small>Profil</small>
  </button>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/tambah-dompet.js"></script>
<script src="js/nav.js"></script>

</body>
</html>

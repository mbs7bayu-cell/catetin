<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82C4" id="themeColor">
<title>Dashboard</title>

<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/navigasi.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

</style>

</head>

<body>

<div class="container">

  <div class="header">

      <div class="headerTop">

        <div class="appTitle">

          <img
            src="./icon-512.png"
            alt="Logo"
            class="logoDashboard"
          >

          <div class="appText">
            <div>Catet-In</div>
          </div>

        </div>

        <div class="keepLoginBox">

          <span class="rememberText">
            Always<br>Login
          </span>

          <div class="settingBox">

            <label class="switch">
              <input type="checkbox" id="rememberLogin">
              <span class="slider"></span>
            </label>

            <button class="themeBtn" onclick="toggleTheme()">
              🌙
            </button>

          </div>

        </div>

      </div>

      <p id="userInfo"></p>

      <div id="ringkasanBulan" class="ringkasanBulan">
        <div class="itemRingkasan">
          <span>Pemasukan:</span><br>
          <strong id="totalMasukBulan" class="skeleton-text"></strong>
        </div>

        <div class="itemRingkasan">
        <span>Pengeluaran:</span><br>
        <strong id="totalKeluarBulan" class="skeleton-text"></strong>
        </div>
      </div>

      <button 
      id="telegramBtn"
      class="telegramButton"
      onclick="hubungkanTelegram()">
      🤖 Hubungkan Telegram
      </button>

  </div>

  <div class="card">

    <div class="saldoHeader">

      <span class="labelSaldo">
        Saldo :
      </span>

    <button
      id="btnToggleSaldo"
      class="btnEye"
      onclick="toggleSaldo()"
    >
      👁
    </button>

    </div>

    <div style="text-align:center;">
      <div
        id="saldo"
        class="saldo skeleton-saldo"
      ></div>
    </div>

  </div>

  <div class="card">

      <p style="margin:0; padding:0; color:var(--text); font-size:12px;">Transaksi Terbaru :</p>

      <div id="listTransaksi" class="skeleton-card">

        <div class="kosong">
        
        </div>

      </div>

  </div>

  <div class="menu">
    <div class="card">
        <p style="margin:0; padding:0; color:var(--text); font-size:12px;">Menu :</p>

          <button onclick="tambahPemasukan()">💰 Pemasukan</button>
          <button onclick="tambahPengeluaran()">💸 Pengeluaran</button>
          <button onclick="transfer()">🔄 Transfer</button>
          <button onclick="kredit()">💳 Kredit</button>

                <hr style="margin:15px 0; opacity:.15;">

          <button class="btnImport" onclick="importTransaksi()">
              📥 Import Transaksi
          </button>


          
    </div>
  </div>

</div>

<div class="bottomNav">

            <button onclick="lihatDashboard()">
              <span>🏠</span>
              <small>Home</small>
            </button>

            <button onclick="lihatDompet()">
              <span>💳</span>
              <small>Dompet</small>
            </button>

            <button onclick="lihatLaporan()">
              <span>📊</span>
              <small>Laporan</small>
            </button>

            <button onclick="lihatProfil()">
              <span>👤</span>
              <small>Profil</small>
            </button>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/nav.js"></script>


</body>
</html>

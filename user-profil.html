<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f2f2ef" id="themeColor">
<title>Laporan</title>
<script src="js/theme-init.js"></script>

<link rel="stylesheet" href="css/profil.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>



<div class="container">

        <div class="header">
            <h2>Profil</h2>
        </div>
        
    <div class="card profil-card">

        <div class="profil-item">
            <span class="label">Nama</span>
            <span class="value" id="namaUser">Loading ...</span>
        </div>

        <div class="profil-item">
            <span class="label">Gmail</span>
            <span class="value" id="gmailUser">Loading ...</span>
        </div>

    </div>

  <div class="card">
    <button class="editBtn" onclick="aturProfil()">Edit Profil</button>
    <button class="logoutBtn" onclick="logout()">Logout</button>
  </div>
  
</div>

<div class="bottomNav">

  <button data-menu="dashboard" onclick="lihatDashboard()">
    <span>🏠</span>
    <small>Home</small>
  </button>

  <button data-menu="dompet" onclick="lihatDompet()">
    <span>💳</span>
    <small>Dompet</small>
  </button>

  <button data-menu="laporan" onclick="lihatLaporan()">
    <span>📊</span>
    <small>Laporan</small>
  </button>

  <button data-menu="user-profil" onclick="lihatProfil()">
    <span>👤</span>
    <small>Profil</small>
  </button>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>

</html>

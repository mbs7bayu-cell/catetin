<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82C4" id="themeColor">
<title>Pengeluaran</title>
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/button.css">

</head>

<body>

<div class="container">

  <div class="header">
    <h2>Tambah Pengeluaran</h2>
  </div>

  <div class="card">

    <label for="sumberDana">Sumber Dana</label>

    <select id="sumberDana">
      <option value="">
        -- pilih dompet --
      </option>
    </select>

    <label for="kategori">Kategori</label>
    <div class="inputWrapper">

      <input
        type="text"
        id="kategori"
        autocomplete="off"
        oninput="showKategori()"
        placeholder="Contoh : Belanja"
      >

      <div id="kategoriDropdown"></div>

    </div>

    <label for="nominal">Nominal</label>

    <input
      type="text"
      id="nominal"
      inputmode="numeric"
      placeholder="Rp 0"
    >

    <label for="catatan">Catatan</label>

    <textarea
      id="catatan"
      placeholder="Catatan"
    ></textarea>

    <p id="status"></p>

    <button
      id="btnSimpan"
      class="primaryBtn"
      onclick="simpanPengeluaran()"
    >
      Simpan
    </button>

    <button
      class="btnBack"
    >
      Kembali
    </button>

  </div>

</div>

<footer id="footer">
© 2026 Catet-In by mbayusubagja
</footer>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/pengeluaran.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f2f2ef" id="themeColor">
<title>Pengeluaran</title>
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/button.css">

</head>

<body>

<div class="container">

  <div class="header">
    <h2>Tambah Pengeluaran</h2>
  </div>

  <div class="card">

    <label for="sumberDana">Sumber Dana</label>

    <select id="sumberDana">
      <option value="">
        -- pilih dompet --
      </option>
    </select>

    <label for="kategori">Kategori</label>
    <div class="inputWrapper">

      <input
        type="text"
        id="kategori"
        autocomplete="off"
        oninput="showKategori()"
        placeholder="Contoh : Belanja"
      >

      <div id="kategoriDropdown"></div>

    </div>

    <label for="nominal">Nominal</label>
    <div class="nominalWrapper">

        <input
            id="nominal"
            type="text"
            inputmode="numeric"
            data-expression=""
            placeholder="0">

        <button type="button" id="btnFx">+</button>

    </div>

        <p id="calcPreview" class="hidden"></p>


    <div id="calcToolbar" hidden>
        <button data-op="+">+</button>
        <button data-op="-">-</button>
        <button data-op="*">×</button>
        <button data-op="/">÷</button>
        <button data-op="(">(</button>
        <button data-op=")">)</button>
        <button data-op="clear">C</button>
    </div>

    <div id="labelCatatan">
        
        <label for="catatan">Catatan</label>
        <textarea id="catatan" placeholder="Catatan"></textarea>

    </div>

    <p id="status"></p>

    <button
      id="btnSimpan"
      class="primaryBtn"
      onclick="simpanPengeluaran()"
    >
      Simpan
    </button>

    <button
      class="btnBack"
    >
      Kembali
    </button>

  </div>

</div>

<div id="loadingImport" class="loadingImport hidden">
    <div class="loadingBox">
        <div class="spinner"></div>
        <h3>Memproses file...</h3>
        <p>Sedang menyimpan transaksi pengeluaran.</p>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/pengeluaran.js"></script>

</body>
</html>

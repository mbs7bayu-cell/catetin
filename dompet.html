<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f2f2ef" id="themeColor">
<title>Dompet</title>
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/button.css">
<link rel="stylesheet" href="css/navigasi.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="modalEdit" class="modal">

  <div class="modalContent">

    <h3>Edit Dompet</h3>

    <input
      type="text"
      id="editNama"
      placeholder="Nama dompet"
    >

    <select id="editTipe">

      <option value="Cash">
        cash
      </option>

      <option value="Bank">
        bank
      </option>

      <option value="E-Wallet">
        e-wallet
      </option>

    </select>

    <div class="modalAction">

      <button onclick="closeModal()">
        Batal
      </button>

      <button id="btnSimpanEdit" onclick="simpanEditDompet()">
        Simpan
      </button>

    </div>

  </div>

</div>

<div class="container">

  <div class="header">
    <h2>Dompet</h2>
  </div>

  <div class="card">
    <div class="card-notice">
      <b>Perhatian :</b><br>Buat minimal 1 dompet untuk melakukan transaksi.
    </div>
    <!-- dompet akan dirender di sini -->
    <div id="dompetList" class="skeleton-card"></div>
  </div>
  

  <div class="card">  
    <button id="btnTambah">+ Tambah Dompet</button>
  </div>

  <div class="bottomNav">

    <button data-menu="dashboard" onclick="lihatDashboard()">
      <span>🏠</span>
      <small>Home</small>
    </button>

    <button data-menu="dompet" onclick="lihatDompet()">
      <span>💳</span>
      <small>Dompet</small>
    </button>

    <button data-menu="laporan" onclick="lihatLaporan()">
      <span>📊</span>
      <small>Laporan</small>
    </button>

    <button data-menu="user-profil" onclick="lihatProfil()">
      <span>👤</span>
      <small>Profil</small>
    </button>

  </div>

</div>


<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/api.js"></script>
<script src="js/dompet.js"></script>
<script src="js/nav.js"></script>
</body>
</html>

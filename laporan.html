<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f2f2ef" id="themeColor">
<title>Laporan</title>
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/button.css">
<link rel="stylesheet" href="css/navigasi.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>



<div class="container">

<div class="header">
<h2>Laporan Keuangan</h2>
</div>

<div class="card">
  <h3>Pemasukan</h3>
  <p id="totalMasuk" class="skeleton-text"></p>
</div>

<div class="card">
  <h3>Pengeluaran</h3>
  <p id="totalKeluar" class="skeleton-text"></p>
</div>

<div class="card">
  <h3>Sisa Saldo</h3>
  <p id="sisaSaldo" class="skeleton-text"></p>
</div>

<div class="card">
  <h3>Bulan</h3>
  <div id="listBulan" class="skeleton-card"></div>
</div>

<div
  class="card"
  id="cardListTanggal"
  style="display:none;"
>

  <div
    class="menuLaporan"
    id="menuLaporan"
    style="display:none;"
  >

    <div
      id="menuRincian"
      class="menuAktif"
      onclick="showTab('rincian')"
    >
      Rincian
    </div>

    <div
      id="menuKategori"
      onclick="showTab('kategori')"
    >
      Kategori
    </div>

  </div>

  <div id="tabRincian">

    <div id="listTanggal"></div>

  </div>

  <div
    id="tabKategori"
    style="display:none;"
  >

    <div id="listKategori"></div>

  </div>

</div>


<div class="bottomNav">

  <button data-menu="dashboard" onclick="lihatDashboard()">
    <span>🏠</span>
    <small>Home</small>
  </button>

  <button data-menu="dompet" onclick="lihatDompet()">
    <span>💳</span>
    <small>Dompet</small>
  </button>

  <button data-menu="laporan" onclick="lihatLaporan()">
    <span>📊</span>
    <small>Laporan</small>
  </button>

  <button data-menu="user-profil" onclick="lihatProfil()">
    <span>👤</span>
    <small>Profil</small>
  </button>

</div>

         

</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script src="js/supabase.js"></script>
<script src="js/api.js"></script>
<script src="js/laporan.js"></script>
<script src="js/download-laporan.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@latest/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@latest/dist/jspdf.plugin.autotable.js"></script>

</body>
</html>
